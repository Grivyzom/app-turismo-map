  redis:
    image: redis:7-alpine
    container_name: turismo_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: turismo_backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # Point DB and Redis hostnames to their respective docker-compose services
      DB_HOST: host.docker.internal
      REDIS_ADDR: redis:6379
    volumes:
      - ./app-turismo/assets/svg:/root/assets/svg
    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: app-turismo/Dockerfile
      # Build arguments are injected into the Expo Web compiler at build-time
      args:
        EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${EXPO_PUBLIC_GOOGLE_MAPS_API_KEY}
        EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY: ${EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_API_KEY}
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID}
        EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID}
        EXPO_PUBLIC_BACKEND_URL: ${EXPO_PUBLIC_BACKEND_URL:-http://localhost:8081}
        VITE_API_URL: ""
    container_name: turismo_frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
      - whisper

  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    container_name: turismo_whisper
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - whisper_cache:/root/.cache/huggingface
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  whisper_cache:
    driver: local
